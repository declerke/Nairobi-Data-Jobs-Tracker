name: Security Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Every Monday 06:00 UTC

jobs:
  python-audit:
    name: Python Dependency Audit
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit (main dependencies)
        run: pip-audit -r requirements.txt

      - name: Run pip-audit (Airflow image dependencies)
        run: pip-audit -r requirements.airflow.txt
